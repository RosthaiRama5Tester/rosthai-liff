<!DOCTYPE html>
<html lang="th">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ชำระเงินสำเร็จ</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#ff5a1f;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{

      width:100%;
      max-width:420px;

      background:white;

      border-radius:30px;

      padding:40px 30px;

      text-align:center;

      box-shadow:0 10px 30px rgba(0,0,0,0.15);

      animation:fadeIn 0.5s ease;

    }

    .success-icon{

      width:120px;
      height:120px;

      background:#e8fff0;

      border-radius:50%;

      margin:0 auto 25px;

      display:flex;
      justify-content:center;
      align-items:center;

      animation:pop 0.5s ease;

    }

    .checkmark{

      font-size:64px;

      color:#1db954;

      font-weight:bold;

    }

    .title{

      font-size:38px;

      font-weight:bold;

      color:#ff5a1f;

      margin-bottom:15px;

    }

    .subtitle{

      color:#666;

      line-height:1.8;

      font-size:18px;

      margin-bottom:30px;

    }

    .payment-box{

      background:#fff5f1;

      border-radius:20px;

      padding:20px;

      margin-bottom:30px;

      text-align:left;

    }

    .payment-item{

      display:flex;
      justify-content:space-between;

      margin-bottom:15px;

      font-size:18px;

    }

    .payment-item:last-child{
      margin-bottom:0;
    }

    .payment-label{
      color:#666;
    }

    .payment-value{
      font-weight:bold;
      color:#333;
    }

    .status{

      color:#1db954;

      font-weight:bold;

    }

    .btn{

      width:100%;

      border:none;

      padding:18px;

      border-radius:16px;

      font-size:20px;

      font-weight:bold;

      cursor:pointer;

      transition:0.2s;

      margin-bottom:15px;

    }

    .primary-btn{

      background:#ff5a1f;

      color:white;

    }

    .secondary-btn{

      background:#f2f2f2;

      color:#333;

    }

    .btn:hover{
      opacity:0.9;
    }

    .footer{

      margin-top:20px;

      font-size:14px;

      color:#999;

      line-height:1.6;

    }

    @keyframes pop{

      0%{
        transform:scale(0.5);
        opacity:0;
      }

      100%{
        transform:scale(1);
        opacity:1;
      }

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

  </style>

</head>

<body>

<div class="container">

  <!-- Success Icon -->
  <div class="success-icon">

    <div class="checkmark">
      ✓
    </div>

  </div>

  <!-- Title -->
  <div class="title">
    ชำระเงินสำเร็จ
  </div>

  <div class="subtitle">

    ระบบได้รับข้อมูลการชำระเงินของคุณเรียบร้อยแล้ว<br>
    กรุณารอการตรวจสอบจากทีมงาน

  </div>

  <!-- Payment Info -->
  <div class="payment-box">

    <div class="payment-item">

      <div class="payment-label">
        แพ็คเกจ
      </div>

      <div class="payment-value">
        แพ็คอาหาร 15 วัน
      </div>

    </div>

    <div class="payment-item">

      <div class="payment-label">
        จำนวนเงิน
      </div>

      <div class="payment-value">
        3,000 บาท
      </div>

    </div>

    <div class="payment-item">

      <div class="payment-label">
        สถานะ
      </div>

      <div class="payment-value status">
        รอตรวจสอบ
      </div>

    </div>

  </div>

  <!-- Buttons -->
  <button
    class="btn primary-btn"
    onclick="goWallet()"
  >
    ไปยัง Wallet
  </button>

  <button
    class="btn secondary-btn"
    onclick="goHome()"
  >
    กลับหน้าหลัก
  </button>

  <!-- Footer -->
  <div class="footer">

    หากพบปัญหาในการชำระเงิน<br>
    กรุณาติดต่อทีมงาน รสไท ปิ่นโต

  </div>

</div>

<script>

const LIFF_ID = "2010108734-5UUXYrMv";

async function main(){

  await liff.init({
    liffId: LIFF_ID
  });

}

main();

function goWallet(){

  window.location.href =
    "wallet.html";

}

function goHome(){

  window.location.href =
    "index.html";

}

</script>

</body>
</html>
