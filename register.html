<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รสไท ปิ่นโต - สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#ff6a2a;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo img{
      width:90px;
    }

    h2{
      text-align:center;
      color:#ff6a2a;
      margin-top:10px;
      margin-bottom:25px;
    }

    label{
      font-weight:bold;
      display:block;
      margin-bottom:8px;
    }

    input,
    textarea{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:10px;
      margin-bottom:18px;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:90px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#ff6a2a;
      color:#fff;
      font-size:17px;
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    #loading{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.4);
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .spinner{
      width:60px;
      height:60px;
      border:6px solid #eee;
      border-top:6px solid #ff6a2a;
      border-radius:50%;
      animation:spin 1s linear infinite;
      background:#fff;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
</div>

<div class="card">

  <div class="logo">
    <img src="PIC/logo.png" alt="Logo">
  </div>

  <h2>รสไท ปิ่นโต</h2>

<form id="registerForm">

  <label>ชื่อ-นามสกุล</label>
  <input
    type="text"
    id="name"
    name="name"
    required
  >

  <label>ที่อยู่จัดส่ง</label>
  <textarea
    id="address"
    name="address"
    required
  ></textarea>

  <label>เบอร์โทรศัพท์</label>
  <input
    type="tel"
    id="phone"
    name="phone"
    required
  >

  <button
    type="button"
    onclick="submitForm()"
  >
    สมัครสมาชิก
  </button>

</form>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

const LIFF_ID = "2010108734-5UUXYrMv";

const API_URL =
"https://script.google.com/macros/s/AKfycbxqRrBaFJCkohj6EuF_fhA6whdZB3j4HeepqYpRQwGzYs6rXQ6Oz2OEBrmx5nSSzBic5A/exec";

async function initLiff() {

  await liff.init({
    liffId: LIFF_ID
  });

  if (!liff.isLoggedIn()) {

    liff.login({
      redirectUri: window.location.href
    });

    return;
  }

}

initLiff();

function showLoading() {
  document.getElementById("loading").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loading").style.display = "none";
}

async function submitForm() {

  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!name || !address || !phone) {
    alert("กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  if (name.length < 2) {
  alert("กรุณากรอกชื่อ-นามสกุลให้ถูกต้อง");
  return;
}

  if (address.length < 10) {
  alert("กรุณากรอกที่อยู่จัดส่งให้ละเอียด");
  return;
}

  const phoneRegex = /^0[0-9]{9}$/;

  if (!phoneRegex.test(phone)) {
    alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง");
    return;
}

  showLoading();

  try {

    const profile = await liff.getProfile();
      const values = sheet.getDataRange().getValues();

for (let i = 1; i < values.length; i++) {
  if (values[i][1] === userId) {
    return ContentService
      .createTextOutput(JSON.stringify({
        status: "exists"
      }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

if (result.status === "exists") {
  alert("คุณเป็นสมาชิกอยู่แล้ว");
  window.location.href = "package.html";
  return;
}

    const formData = new URLSearchParams();

    formData.append("userId", profile.userId);
    formData.append("displayName", profile.displayName);
    formData.append("name", name);
    formData.append("phone", phone);
    formData.append("address", address);

    const response = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const result = await response.json();

    hideLoading();

    if (result.status === "success") {

      window.location.href = "package.html";

    } else {

      alert(result.message || "เกิดข้อผิดพลาด");

    }

  } catch (err) {

    hideLoading();

    console.error(err);

    alert("เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ");

  }

}

</script>
