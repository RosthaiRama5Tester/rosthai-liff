<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Verify</title>

<style>

body{
  font-family:sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:20px;
  color:#ff5a1f;
}

.card{

  background:white;

  border-radius:20px;

  padding:20px;

  margin-bottom:20px;

  box-shadow:0 5px 15px rgba(0,0,0,0.08);

}

.slip-image{

  width:100%;

  max-width:250px;

  border-radius:14px;

  margin-top:15px;

}

.info{
  margin-bottom:10px;
}

.btn-group{
  display:flex;
  gap:10px;
  margin-top:20px;
}

button{

  flex:1;

  border:none;

  padding:14px;

  border-radius:12px;

  font-size:16px;

  cursor:pointer;

  color:white;

}

.approve{
  background:#1db954;
}

.reject{
  background:#ff4d4f;
}

</style>

</head>

<body>

<div class="title">
  ระบบตรวจสอบการชำระเงิน
</div>

<div id="paymentList"></div>

<script>

const API_URL =
  "YOUR_GOOGLE_SCRIPT_URL";

async function loadPayments(){

  const response =
    await fetch(API_URL);

  const data =
    await response.json();

  const container =
    document.getElementById("paymentList");

  container.innerHTML = "";

  data.forEach(item=>{

    container.innerHTML += `

      <div class="card">

        <div class="info">
          <strong>ชื่อ:</strong>
          ${item.name}
        </div>

        <div class="info">
          <strong>แพ็คเกจ:</strong>
          ${item.package}
        </div>

        <div class="info">
          <strong>จำนวนเงิน:</strong>
          ${item.amount} บาท
        </div>

        <div class="info">
          <strong>สถานะ:</strong>
          ${item.status}
        </div>

        <img
          class="slip-image"
          src="${item.slipUrl}"
        >

        <div class="btn-group">

          <button
            class="approve"
            onclick="approvePayment('${item.row}')"
          >
            อนุมัติ
          </button>

          <button
            class="reject"
            onclick="rejectPayment('${item.row}')"
          >
            ปฏิเสธ
          </button>

        </div>

      </div>

    `;

  });

}

async function approvePayment(row){

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"approve",
      row:row
    })
  });

  alert("อนุมัติสำเร็จ");

  loadPayments();

}

async function rejectPayment(row){

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"reject",
      row:row
    })
  });

  alert("ปฏิเสธเรียบร้อย");

  loadPayments();

}

loadPayments();

</script>

</body>
</html>
